name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

# Supply-chain note (crates.io provenance): release-plz drives `cargo publish`,
# which today has no build-provenance / attestation mechanism comparable to npm
# --provenance or PyPI attestations; crates.io Trusted Publishing (OIDC, no
# long-lived token) is being rolled out upstream. This workflow is deliberately
# left on the CARGO_REGISTRY_TOKEN flow. Migrating to Trusted Publishing is a
# conservative follow-up: when release-plz-action documents an
# `id-token: write` OIDC path, add `permissions: id-token: write` to THIS job
# only and drop CARGO_REGISTRY_TOKEN.
jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'multiagentcoordinationprotocol' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pin the same toolchain as rust-toolchain.toml so release-plz's build /
      # semver-check / publish-verify steps run the workspace compiler rather
      # than rustup's minimal auto-install of the file pin.
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96.1"

      # macp-runtime's build.rs generates gRPC stubs via tonic-prost-build, so
      # every crate build (which release-plz runs for semver-check and publish
      # verification) needs protoc on PATH.
      - uses: arduino/setup-protoc@f4d5893b897028ff5739576ea0409746887fa536 # v3.0.0
        with:
          version: "31.x"
          repo-token: ${{ github.token }}

      - uses: MarcoIeni/release-plz-action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
