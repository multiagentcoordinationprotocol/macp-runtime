name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

# release-plz owns versioning + git only. `publish = false` in release-plz.toml
# means it never runs `cargo publish` here (so no CARGO_REGISTRY_TOKEN is needed);
# it opens the version-bump PR and, on merge, creates the git tags + GitHub
# Release. The crates.io upload is done by publish.yml, triggered by the
# `macp-runtime-v*` tag created here.
jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'multiagentcoordinationprotocol' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pin the same toolchain as rust-toolchain.toml so release-plz's build /
      # semver-check / publish-verify steps run the workspace compiler rather
      # than rustup's minimal auto-install of the file pin.
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96.1"

      # macp-runtime's build.rs generates gRPC stubs via tonic-prost-build, so
      # every crate build (which release-plz runs for semver-check and publish
      # verification) needs protoc on PATH.
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "31.x"
          repo-token: ${{ github.token }}

      - uses: MarcoIeni/release-plz-action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
