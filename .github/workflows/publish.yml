name: Publish Crates

# Publishes the workspace crates to crates.io in dependency order when a
# version tag (e.g. v0.4.0) is pushed. Can also be run manually for a dry run.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package and verify without uploading"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      # Guard against tagging a release whose version doesn't match the
      # workspace. The tag drives the release; the manifest must agree.
      - name: Verify tag matches workspace version
        if: github.ref_type == 'tag'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="macp-runtime") | .version')
          echo "tag=$tag workspace=$ws"
          if [ "$tag" != "$ws" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace version $ws"
            exit 1
          fi

      # Publish bottom-up so each crate's dependencies are already on the index.
      # `cargo publish` waits for the just-published version to appear before
      # returning, so the next crate's verify build can resolve it.
      # A crate whose version is already live is skipped, making a re-run after
      # a mid-release failure safe.
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          crates=(macp-pb macp-core macp-storage macp-policy macp-modes macp-auth macp-runtime)

          is_published() {
            local name="$1" ver="$2" code
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -A "macp-runtime-release (https://github.com/multiagentcoordinationprotocol/runtime)" \
              "https://crates.io/api/v1/crates/$name/$ver")
            [ "$code" = "200" ]
          }

          for c in "${crates[@]}"; do
            ver=$(cargo metadata --format-version 1 --no-deps \
              | jq -r ".packages[] | select(.name==\"$c\") | .version")
            if is_published "$c" "$ver"; then
              echo "==> skip $c@$ver (already on crates.io)"
              continue
            fi
            if [ "${DRY_RUN:-false}" = "true" ]; then
              echo "==> dry-run package $c@$ver"
              # Leaf crate can fully verify; dependents can't until upstream is
              # live, so package without the cross-crate verify build.
              if [ "$c" = "macp-pb" ]; then
                cargo publish --dry-run --locked -p "$c"
              else
                cargo package --no-verify --locked -p "$c"
              fi
            else
              echo "==> publish $c@$ver"
              cargo publish --locked -p "$c"
            fi
          done
