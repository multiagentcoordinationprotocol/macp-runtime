name: Scheduled Security Audit

# RUSTSEC advisories land between PRs; the per-PR audit gate only fires when
# someone pushes. This weekly sweep surfaces new advisories against the
# current lockfile even when the repo is quiet. Findings open/update a GitHub
# issue via rustsec/audit-check's built-in reporting.
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: cargo audit (weekly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-issues: true
