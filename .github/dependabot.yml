version: 2
updates:
  # Rust dependencies (workspace). Grouped to keep PR volume low:
  #   minor-and-patch -> one auto-mergeable PR
  #   major-updates   -> one PR for review (majors usually need code changes)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major-updates:
        update-types: ["major"]
    ignore:
      - dependency-name: "jsonwebtoken"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: cargo
    directory: "/integration_tests"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      major-updates:
        update-types: ["major"]

  # All GitHub Actions bumps arrive as ONE grouped PR (SHA + comment updates).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
